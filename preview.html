<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pong Retro</title>
<style>
    body {
        margin: 0;
        background: black;
        overflow: hidden;
        font-family: monospace;
        color: white;
        text-align: center;
    }
    canvas {
        display: block;
        margin: 0 auto;
        background: black;
        border: 4px solid white;
    }
</style>
</head>
<body>

<h2>PONG RETRO</h2>
<canvas id="game" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const paddleWidth = 10;
const paddleHeight = 80;
const ballSize = 10;

let playerY = canvas.height/2 - paddleHeight/2;
let cpuY = canvas.height/2 - paddleHeight/2;

let ballX = canvas.width/2;
let ballY = canvas.height/2;
let ballSpeedX = 5;
let ballSpeedY = 3;

let playerScore = 0;
let cpuScore = 0;

document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowUp") playerY -= 20;
    if (e.key === "ArrowDown") playerY += 20;
});

function drawRect(x, y, w, h) {
    ctx.fillStyle = "white";
    ctx.fillRect(x, y, w, h);
}

function drawBall() {
    ctx.fillStyle = "white";
    ctx.fillRect(ballX, ballY, ballSize, ballSize);
}

function drawNet() {
    for (let i = 0; i < canvas.height; i += 20) {
        drawRect(canvas.width/2 - 1, i, 2, 10);
    }
}

function resetBall() {
    ballX = canvas.width/2;
    ballY = canvas.height/2;
    ballSpeedX = -ballSpeedX;
}

function update() {
    ballX += ballSpeedX;
    ballY += ballSpeedY;

    // Rebote arriba y abajo
    if (ballY <= 0 || ballY + ballSize >= canvas.height) {
        ballSpeedY = -ballSpeedY;
    }

    // Colisión jugador
    if (ballX <= paddleWidth &&
        ballY > playerY &&
        ballY < playerY + paddleHeight) {
        ballSpeedX = -ballSpeedX;
    }

    // Colisión CPU
    if (ballX + ballSize >= canvas.width - paddleWidth &&
        ballY > cpuY &&
        ballY < cpuY + paddleHeight) {
        ballSpeedX = -ballSpeedX;
    }

    // Punto
    if (ballX < 0) {
        cpuScore++;
        resetBall();
    }
    if (ballX > canvas.width) {
        playerScore++;
        resetBall();
    }

    // IA básica
    cpuY += ((ballY - (cpuY + paddleHeight/2))) * 0.08;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawNet();
    drawRect(0, playerY, paddleWidth, paddleHeight);
    drawRect(canvas.width - paddleWidth, cpuY, paddleWidth, paddleHeight);
    drawBall();

    ctx.fillText(playerScore, canvas.width/4, 30);
    ctx.fillText(cpuScore, canvas.width*3/4, 30);
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
